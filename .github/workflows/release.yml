name: Release

on:
  push:
    tags:
      - "v*"

# Cancel a tag's pipeline if it's superseded (rare but safe).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(uv run python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $pkg"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Check distributions
        run: |
          ls -la dist/
          uv run --with twine twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted publishing — configure on PyPI side at
    # https://pypi.org/manage/project/harness-scaffold/settings/publishing/
    # (project name: harness-scaffold, workflow: release.yml,
    #  environment: pypi)
    environment:
      name: pypi
      url: https://pypi.org/p/harness-scaffold
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: attach artifacts to GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create / update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "$tag" \
              --notes "See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi
